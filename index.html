<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ADIGO - Yo'naltirilmoqda...</title>
    <style>
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: #ffffff;
            color: #0A1531;
        }
        .container {
            text-align: center;
        }
        .loader {
            width: 40px;
            height: 40px;
            border: 3px solid #f3f3f3;
            border-top: 3px solid #0A1531;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 0 auto 20px;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        p {
            font-size: 18px;
            font-weight: 500;
            letter-spacing: 0.5px;
        }
    </style>
    <script>
        function redirect() {
            var playStoreUrl = "https://play.google.com/store/apps/details?id=com.adigo.taxi";

            // Avtomatik yo'naltirish
            window.location.href = playStoreUrl;

            // Agar brauzer avtomatik o'tmasa (masalan ba'zi in-app brauzerlarda),
            // 2 soniyadan keyin yana urinib ko'radi
            setTimeout(function() {
                window.location.href = playStoreUrl;
            }, 2000);
        }

        window.onload = redirect;
    </script>
</head>
<body>
    <div class="container">
        <div class="loader"></div>
        <p>Yo'naltirilmoqda...</p>
    </div>
</body>
</html>
